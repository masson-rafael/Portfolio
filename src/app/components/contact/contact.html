<section id="contact" aria-labelledby="contact-title">
  <h2 id="contact-title">- Me contacter -</h2>
  <div class="contact-container">
    <div class="contact-form-wrapper">
      <p class="contact-intro">
        Un projet ? En plein recrutement ?<br>
        N'hésitez plus, entrons en contact !
      </p>
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Votre mail</label>
          <input type="email" id="email" formControlName="email" placeholder="Votre adresse email" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="subject">Objet</label>
          <input type="text" id="subject" formControlName="subject" placeholder="Objet de votre message">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" formControlName="message" rows="5" placeholder="Votre message"></textarea>
        </div>
        <button type="submit" class="send-btn" [attr.disabled]="contactForm.invalid ? '' : null">Envoyer</button>
      </form>
    </div>

    <div class="contact-links">
      <a href="https://www.linkedin.com/in/rafaelmasson40/" target="_blank" rel="noopener noreferrer" class="contact-btn">
        <i class="fab fa-linkedin" aria-hidden="true"></i>
        Rafael Masson - LinkedIn
      </a>
      <a href="CV_Masson_Rafael.pdf" target="_blank" rel="noopener noreferrer" download class="contact-btn">
        <i class="fas fa-download" aria-hidden="true"></i>
        Téléchargez ici mon CV
      </a>
    </div>
  </div>
</section>
