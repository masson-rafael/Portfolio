<header id="header">
  <nav class="navbar" [class.transparent]="isAtTop()" aria-label="Navigation principale">
    <div class="navbar-branding">
      <a href="#header" class="navbar-logo" aria-label="Retour en haut">RM</a>
      <div class="navbar-brand-text">
        <span class="navbar-name">Rafael Masson</span>
        <span class="navbar-role">Portfolio • Full Stack</span>
      </div>
    </div>
    <ul class="navbar-list" role="list">
      @for (link of navLinks(); track link.fragment) {
        <li>
          <a [href]="'#' + link.fragment">{{ link.label }}</a>
        </li>
      }
      <li>
        <a href="CV_Masson_Rafael.pdf" target="_blank" rel="noopener noreferrer">
          CV
          <i class="fas fa-download" aria-hidden="true"></i>
        </a>
      </li>
      <li>
        <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDarkMode() ? 'Passer au mode clair' : 'Passer au mode sombre'">
          <i class="fas" [class.fa-sun]="isDarkMode()" [class.fa-moon]="!isDarkMode()" aria-hidden="true"></i>
        </button>
      </li>
    </ul>
  </nav>
  <div class="hero">
    <h1 class="header-title">Rafael Masson</h1>
    <p class="header-subtitle">Étudiant en BUT Informatique</p>
  </div>
</header>
