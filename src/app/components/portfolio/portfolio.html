<section id="portfolio" aria-labelledby="portfolio-title">
  <h2 id="portfolio-title">- Portfolio -</h2>

  <div class="container-xl">
    <div class="row g-4 justify-content-center">
      @for (project of projects(); track project.title) {
        <div class="col-12 col-lg-6">
          <article class="project-card h-100">
            <div class="card-image">
              <img [ngSrc]="project.image" [alt]="project.imageAlt" width="370" height="250">
            </div>
            <div class="card-body">
              <h3>{{ project.title }}</h3>
              <p class="card-description">{{ project.description }}</p>
              @if (project.link) {
                <a [href]="project.link" target="_blank" rel="noopener noreferrer" class="card-link">
                  <i class="fab fa-github" aria-hidden="true"></i> Voir sur GitHub
                </a>
              }
              <p class="card-languages">{{ project.languages }}</p>
            </div>
          </article>
        </div>
      }
    </div>
  </div>
</section>
